# ================================
# KEYD CONFIGURATION
# ================================
# Layout:
#   Ctrl     = Ctrl  (terminal, right-click, system shortcuts — unchanged)
#   Alt      = Super (Hyprland window management modifier)
#   Super    = Command layer (copy/paste/app shortcuts)
#   CapsLock = Alt   (Figma, browser shortcuts, etc.)

[ids]
*

[main]
leftalt = leftmeta
rightalt = rightmeta
leftmeta = layer(cmd)
rightmeta = layer(cmd)

# ================================
# COMMAND LAYER (Super key)
# Mac-style app shortcuts
# ================================
[cmd]
c = C-c
v = C-v
x = C-x
z = C-z
a = C-a
f = C-f
w = C-w
t = C-t
n = C-n
s = C-s
o = C-o
p = C-p
r = C-r
h = C-h
l = C-l
k = C-k
u = C-u
y = C-y
b = C-b
i = C-i
e = C-e
d = C-d
g = C-g
m = C-m
q = C-q
j = C-j
grave = C-grave
tab = A-tab
