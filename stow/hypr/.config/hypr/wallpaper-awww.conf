# awww wallpaper transition (sourced by system-awww-wallpaper + system-pick-wallpaper)
# Env names match `awww img --help` (AWWW_TRANSITION, AWWW_TRANSITION_STEP, …)
#
# transition: none | simple | fade | left | right | top | bottom | wipe | wave |
#             grow | center | any | outer | random
export AWWW_TRANSITION="${AWWW_TRANSITION:-fade}"
export AWWW_TRANSITION_STEP="${AWWW_TRANSITION_STEP:-40}"
export AWWW_TRANSITION_DURATION="${AWWW_TRANSITION_DURATION:-2.5}"
export AWWW_TRANSITION_FPS="${AWWW_TRANSITION_FPS:-60}"
# grow / outer only (ignored for fade):
# export AWWW_TRANSITION_POS="0.2,0.2"
