general {
    lock_cmd = system-lock
    before_sleep_cmd = bash -lc 'system-hyprsession save 2>/dev/null || true; loginctl lock-session'
    after_sleep_cmd = bash -lc '$HOME/.local/bin/system-lock-after-sleep'
    inhibit_sleep = 3
}

listener {
    timeout = 120 # 2min - dim before lock
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

listener {
    timeout = 300 # 5min - lock
    on-timeout = loginctl lock-session
}

# No DPMS-off listener: the display (DP-6) is driven by the NVIDIA card, and
# the session-lock surface cannot survive the monitor being powered off while
# locked -- it repaints black and never recovers, forcing an SSH rescue.
# Upstream's guidance is "do not disable monitors while the lock client is running".
# So when locked the screen stays on, dimmed to 10% by the 2min listener above.
