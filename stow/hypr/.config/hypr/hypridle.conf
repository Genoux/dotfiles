general {
    lock_cmd = pgrep -x hyprlock > /dev/null || hyprlock
    before_sleep_cmd = bash -lc 'system-hyprsession save 2>/dev/null || true; loginctl lock-session'
    after_sleep_cmd = bash -lc '$HOME/.local/bin/system-hyprlock-after-sleep'
    inhibit_sleep = 3
}

listener {
    timeout = 120 # 2min - dim before lock
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

listener {
    timeout = 300 # 5min - lock
    on-timeout = loginctl lock-session
}

listener {
    timeout = 600 # 10min - turn the display off (no suspend: AMD 600-series + this BIOS
                  # only support deep S3, which can't wake from USB; staying awake with the
                  # screen off keeps the session live and wakes instantly on any input)
    on-timeout = hyprctl dispatch 'hl.dsp.dpms("off")'
    on-resume = hyprctl dispatch 'hl.dsp.dpms("on")'
}
