# ================================
# HYPRLAND APPEARANCE CONFIG
# ================================
# Visual styling, animations, and effects

# ================================
# GENERAL LAYOUT & STYLING
# ================================
general {
    # Core layout settings
    gaps_in = 2
    gaps_out = 8
    border_size = 1

    # Window behavior
    no_focus_fallback = false
    resize_on_border = true
    allow_tearing = false

    # Layout
    layout = dwindle
}

# ================================
# VISUAL EFFECTS & DECORATION
# ================================
decoration {
    # Corner rounding
    rounding_power = 2
    rounding = 6

    # Window opacity
    active_opacity = 0.95
    inactive_opacity = 0.93

    # Drop shadows
    # Battery optimization: Reduced shadow range and render_power
    # Original values: range = 27, render_power = 3
    # shadow {
    #     enabled = true
    #     range = 15
    #     render_power = 2
    #     color = rgba(0,0,0,0.23)
    #     offset = 2 2
    # }

    # Blur effects — frosted glass preset
    # Smaller kernel + more passes = smoother gradient (less "soupy")
    # Low noise keeps the surface clean; mild contrast/brightness adds the glass sheen.
    blur {
        enabled = true
        xray = false
        special = true
        new_optimizations = true
        size = 8
        passes = 4
        brightness = 1.05
        noise = 0.01
        contrast = 1.1
        vibrancy = 0.22
        vibrancy_darkness = 0.4
        popups = true
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }

    shadow {
        # macOS-style: large, very soft, low opacity, gravity-pulled downward.
        # Reads as ambient occlusion / depth rather than a defined edge.
        enabled = true
        ignore_window = true
        range = 50
        render_power = 4
        offset = 0 20
        color = rgba(00000026)
        color_inactive = rgba(00000014)
    }
}

# ================================
# ANIMATIONS
# ================================
animations {
    enabled = true
    bezier = easeIn, 0.78, 0, 0.22, 1
    animation = global, 1, 1.5, easeIn
    animation = workspaces, 1, 2, easeIn, slide
    animation = layers, 1, 2, easeIn, slide
    animation = windows, 1, 2, easeIn, popin 98%
    animation = border, 1, 2, easeIn
    animation = specialWorkspace, 1, 2, easeIn
}
