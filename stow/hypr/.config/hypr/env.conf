env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = ELECTRON_ENABLE_WAYLAND,1
env = ELECTRON_DISABLE_FRAME,1
env = ELECTRON_DISABLE_DEFAULT_MENU_BAR,1

# ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ  ÔľÜ  ‚Ėą‚ĖÄ ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą  ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚ĖÄ‚Ėą‚ĖÄ ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ
# ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚Ėą‚ĖĄ  ÔľÜ  ‚Ėą‚ĖĄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ  ‚ĖĄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚ĖĎ‚Ėą‚ĖĎ ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚ĖĄ‚Ėą
# GTK theme
env = GTK_THEME,MacTahoe-Dark
env = XCURSOR_PATH,$HOME/.local/share/icons:$HOME/.icons:/usr/share/icons:/usr/share/pixmaps

# ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ ‚Ėą ‚Ėą‚ĖÄ ‚ĖĄ‚ĖÄ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą  ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖÄ
# ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ ‚Ėą ‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą  ‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĄ ‚Ėą ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖĄ
env = TERMINAL,kitty
# Java AWT
env = JAVA_AWT_WM_NONREPARENTING,1
# GTK/QT scaling - set to 1 for 1080p desktop
env = GDK_SCALE,1
env = QT_SCALE_FACTOR,1

# Gaming performance
env = WINE_CPU_TOPOLOGY,4:2
env = DXVK_ASYNC,1
env = DXVK_STATE_CACHE,1
