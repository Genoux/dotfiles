# ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ  ‚Ėą‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą  ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą ‚Ėą ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ
# ‚Ėą‚ĖĄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚Ėą‚ĖĄ  ‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą  ‚ĖĄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą ‚Ėą‚ĖĄ ‚Ėą‚Ėą‚ĖĄ ‚ĖĄ‚Ėą
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP GBM_BACKEND __GLX_VENDOR_LIBRARY_NAME LIBVA_DRIVER_NAME WLR_DRM_DEVICES WLR_RENDER_DRM_DEVICE WLR_NO_HARDWARE_CURSORS
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP GBM_BACKEND __GLX_VENDOR_LIBRARY_NAME LIBVA_DRIVER_NAME WLR_DRM_DEVICES WLR_RENDER_DRM_DEVICE WLR_NO_HARDWARE_CURSORS
exec-once = sleep 1 && systemctl --user restart xdg-desktop-portal-hyprland.service xdg-desktop-portal.service

# Authentication agent
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Hyprland plugins
exec-once = hyprpm reload -n

# GNOME settings
exec-once = gsettings set org.gnome.desktop.wm.preferences button-layout appmenu

# Default browser
exec-once = xdg-settings set default-web-browser firefox.desktop

# ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą  ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą ‚Ėą ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ  ( ‚Ėą‚ĖĎ‚Ėą ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą  ‚Ėą‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ )
# ‚Ėą‚ĖĄ‚Ėą ‚ĖĄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ  ‚ĖĄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą ‚Ėą‚ĖĄ ‚Ėą‚Ėą‚ĖĄ ‚ĖĄ‚Ėą  ( ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą ‚Ėą‚ĖÄ‚Ėą  ‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ )
exec-once = systemctl --user start ags.service
exec-once = systemctl --user start walker.service
exec-once = systemctl --user start elephant.service
exec-once = systemctl --user start mako.service
exec-once = systemctl --user start awww-daemon.service
exec-once = systemctl --user start hypridle.service
exec-once = systemctl --user start bluetooth-reconnect.service

