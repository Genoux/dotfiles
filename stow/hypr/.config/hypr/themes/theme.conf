# Layout and decoration preset (edit to taste; colors live in colors.conf)

general {
    gaps_in = 2
    gaps_out = 8
    border_size = 1

    no_focus_fallback = false
    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding_power = 2
    rounding = 6

    active_opacity = 0.95
    inactive_opacity = 0.93

    dim_special = 0.3

    blur {
        enabled = yes
        size = 6
        passes = 3
        new_optimizations = on
        ignore_opacity = on
        xray = false
        special = true
    }

    shadow {
        enabled = true
        ignore_window = true
        range = 50
        render_power = 4
        offset = 0 20
        color = rgba(00000026)
        color_inactive = rgba(00000014)
    }
}
