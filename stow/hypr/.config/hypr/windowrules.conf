# ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ  ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą ‚ĖÄ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ
# ‚Ėą‚ĖĎ‚Ėą ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ  ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą ‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚ĖĄ‚Ėą
# Fix dragging issues and optimize XWayland windows
# DISABLED: This rule was preventing apps from getting focus when launched
windowrule {
 name = xwayland-empty-nofocus
 no_focus = on
 match:class = ^$
 match:title = ^$
 match:xwayland = 1
 match:float = 1
 match:fullscreen = 0
 match:pin = 0
}

windowrule {
  name = xwayland-float-opaque
  no_blur = on
  opaque = on
  border_size = 0
  no_shadow = on
  match:xwayland = 1
  match:float = 1
}


# ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ
# ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖĄ‚Ėą ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ ‚ĖĄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ ‚ĖĄ‚Ėą
windowrule {
  name = browser-empty-noblur
  no_blur = on
  match:class = ^()$
  match:title = ^()$
}


# ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą ‚Ėą‚ĖÄ ‚ĖĄ‚ĖÄ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą  ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ
# ‚Ėą‚ĖĄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą ‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą  ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚ĖĄ‚Ėą
windowrule {
  name = windowrule-slack
  float = on
  size = 1200 800
  match:class = ^(slack)$
}


# ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖĎ ‚Ėą‚ĖÄ‚ĖÄ  ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ
# ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖĄ ‚Ėą‚Ėą‚ĖĄ  ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ ‚ĖĄ‚Ėą
windowrule {
  name = nautilus
  float = on
  center = on
  size = (monitor_w*0.65) (monitor_h*0.65)
  opacity = 0.90 0.90
  match:class = ^(org.gnome.Nautilus)$
}


# GTK File Picker Dialog
windowrule {
  name = file-picker-portal
  float = on
  size = (monitor_w*0.6) (monitor_h*0.7)
  center = on
  opacity = 0.90 0.90
  match:class = ^(xdg-desktop-portal-gtk)$
}

windowrule {
  name = modal-open
  float = on
  match:title = ^(Open)$
}

windowrule {
  name = modal-choose-files
  float = on
  match:title = ^(Choose Files)$
}

windowrule {
  name = modal-save-as
  float = on
  match:title = ^(Save As)$
}

windowrule {
  name = modal-confirm-replace
  float = on
  match:title = ^(Confirm to replace files)$
}

windowrule {
  name = modal-file-operation-progress
  float = on
  match:title = ^(File Operation Progress)$
}


