}


windowrule {
  name = gnome-calculator
  float = on
  center = on
  size = 628 400
  match:class = ^(org.gnome.Calculator)$
}

# Picture-in-Picture windows (YouTube, Firefox, Chrome, etc)
# Firefox and some browsers use "Picture-in-Picture" title
windowrule {
  name = picture-in-picture
  pin = on
  float = on
  size = (monitor_w*0.25) (monitor_h*0.25)
  move = ((monitor_w*1)-(monitor_w*0.255)) ((monitor_h*1)-(monitor_h*0.285))
  match:title = ^(Picture-in-Picture)$
}

# wisper: bottom center (half width = 0.15/2; top y = monitor_h - height - small gap for bar)
windowrule {
  name = wisper
  pin = on
  float = on
  size = (monitor_w*0.15) (monitor_h*0.15)
  move = ((monitor_w*0.5)-(monitor_w*0.075)) ((monitor_h*1)-(monitor_h*0.2))
  match:class = ^(wisper)$
}

# satty - increased height for menu bar spacing
windowrule {
  name = satty
  size = 1280 800
  center = on
  float = on
  match:title = ^(satty)$
}


# OSD (On-Screen Display) overlays - fade animation, blur on
layerrule {
  name = osd
  blur = on
  ignore_alpha = 0.0
  blur_popups = on
  animation = fade
  match:namespace = osd
}

layerrule {
  name = layerrule-brightness-osd
  blur = on
  ignore_alpha = 0.0
  blur_popups = on
  animation = fade
  match:namespace = ^(brightness-osd)$
}


# AGS bar ‚ÄĒ Hypr layer animation (global `layers` is slide); override to fade for show/hide
layerrule {
  name = layerrule-ags-bar
  blur = on
  blur_popups = on
  ignore_alpha = 0.1
  animation = fade
  match:namespace = ^(ags-bar)$
}

# AGS / other GTK4 layer shell ‚ÄĒ enhanced blur (not the bar; bar uses ags-bar namespace)
layerrule {
  name = gtk4-layer-shell
  blur = on
  blur_popups = on
  ignore_alpha = 0.1
  match:namespace = gtk4-layer-shell
}


windowrule {
  name = claude-desktop
  float = on
  center = on
  size = 1280 800
  match:class = ^(Claude|com\.anthropic\.claude-desktop)$
}


# Notification overlays
layerrule {
  name = notifications
  blur = on
  ignore_alpha = 0.0
  match:namespace = notifications
}


layerrule {
  name = walker
  blur = on
  ignore_alpha = 0.1
  animation = fade
  match:namespace = ^(walker)$
}

