# ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĄ ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą ‚ĖÄ‚ĖĄ‚ĖÄ ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚ĖĎ‚Ėą‚ĖĎ  ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚ĖĄ‚Ėą
# Notion Calendar
windowrule {
  name = calcurse
  float = on
  size = 1000 800
  center = on
  match:class = ^(calcurse)$
}


windowrule {
  name = mpv
  float = on
  center = on
  size = (monitor_w*0.3) (monitor_h*0.3)
  pin = on
  match:class = ^(mpv)$
}

# Live cam - browser app mode (cam.jbroom.ca)
windowrule {
  name = live-cam
  float = on
