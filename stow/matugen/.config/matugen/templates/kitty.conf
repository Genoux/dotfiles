# Matugen-generated kitty theme — do not edit
# Included by ~/.config/kitty/kitty.conf
# TUI-friendly (ratatui / wiremix / ncpamixer): named colors map to ANSI 0–15.
# LightGreen=10, LightBlue=12, LightCyan=14 must be three different hues — not all primary.
# color1/9 = primary: ANSI red (31) is the accent; fastfetch title/palette use 31. Bell still uses error.

background            {{colors.surface.default.hex}}
foreground            {{colors.on_surface.default.hex}}
selection_background  {{colors.surface_container_high.default.hex}}
selection_foreground  {{colors.on_surface.default.hex}}
url_color             {{colors.primary.default.hex}}
cursor                {{colors.primary.default.hex}}
cursor_text_color     {{colors.on_primary.default.hex}}
active_border_color   {{colors.primary.default.hex}}
inactive_border_color {{colors.outline.default.hex}}
bell_border_color     {{colors.error.default.hex}}
active_tab_foreground   {{colors.on_primary.default.hex}}
active_tab_background   {{colors.primary.default.hex}}
inactive_tab_foreground {{colors.on_surface_variant.default.hex}}
inactive_tab_background {{colors.surface_container.default.hex}}
tab_bar_background      {{colors.surface.default.hex}}

# Search / vim highlights (use primary family)
mark1_foreground {{colors.on_primary_fixed.default.hex}}
mark1_background {{colors.primary_fixed.default.hex}}
mark2_foreground {{colors.on_secondary_fixed.default.hex}}
mark2_background {{colors.secondary_fixed.default.hex}}
mark3_foreground {{colors.on_tertiary_fixed.default.hex}}
mark3_background {{colors.tertiary_fixed.default.hex}}

# normal (0–7) — classic ANSI roles; 2/3/4/5/6 = green, yellow, blue, magenta, cyan
color0  {{colors.surface.default.hex}}
color1  {{colors.primary.default.hex}}
color2  {{colors.secondary.default.hex}}
color3  {{colors.tertiary.default.hex}}
color4  {{colors.primary.default.hex}}
color5  {{colors.secondary_container.default.hex}}
color6  {{colors.tertiary_container.default.hex}}
# color7 = mid-gray "white" — dark enough that foreground text is readable on it as selection bg
color7  {{colors.outline.default.hex}}

# bright (8–15) — must differ: wiremix uses LightGreen, LightBlue, LightCyan simultaneously
color8  {{colors.surface_container_highest.default.hex}}
color9  {{colors.primary.default.hex}}
color10 {{colors.secondary.default.hex}}
color11 {{colors.tertiary.default.hex}}
color12 {{colors.primary.default.hex}}
color13 {{colors.secondary_container.default.hex}}
color14 {{colors.tertiary.default.hex}}
color15 {{colors.on_surface_variant.default.hex}}
